# Safety v3 policy file (also remains backwards-compatible with `safety check`).
# Run with `safety scan --policy-file safety_policy.yml --output text`.
# Schema reference: https://docs.safetycli.com/safety-2/safety-cli-2/safety-policy-file
version: '3.0'

security:
    ignore-vulnerabilities:
        70612:
            reason: disputed, inapplicable
        51457:
            reason: disputed, inapplicable
    continue-on-vulnerability-error: false

scanning-settings:
    max-depth: 6
    exclude: ['.venv', 'venv', 'env', 'node_modules', 'assets/docs/pycvcqv/_build']
    include-files: []
    system:
        targets: []

report:
    dependency-vulnerabilities:
        enabled: true
        auto-ignore-in-report:
            python:
                environment-results: true
                unpinned-requirements: true
            cvss-severity: []
            vulnerabilities: {}
